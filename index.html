<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당근강의실 :: 레시피 실시간 에디터</title>
    <style>
        :root { --primary: #28a745; --blue: #007bff; --gray: #6c757d; --sidebar-bg: #f8f9fa; --border: #dee2e6; --highlight: #e7f1ff; --cup-blue: #00CCFF; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: #f1f3f5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 */
        .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); background: #fff; font-size: 14px; }
        
        /* 상단 버튼 영역 */
        .button-group { padding: 10px; display: flex; gap: 5px; justify-content: center; background: #eee; border-bottom: 1px solid var(--border); }
        .btn { border: none; padding: 5px 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; }
        .btn-green { background: #198754; }
        .btn-blue { background: #0d6efd; }
        .btn-gray { background: #6c757d; }

        /* 트리 노드 */
        .tree-container { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .node { margin-bottom: 5px; }
        .node-header { display: flex; align-items: center; padding: 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; background: #fff; border: 1px solid #eee; }
        .node-header:hover { background: #f0f0f0; }
        .node-header.active { background: var(--highlight); color: #0d6efd; border-color: #0d6efd; font-weight: bold; }
        .icon { margin-right: 8px; width: 16px; height: 16px; fill: var(--cup-blue); }

        .props-container { margin-left: 20px; display: none; padding: 10px; border: 1px solid #ddd; border-top: none; background: #fff; }
        .props-container.show { display: block; }
        .prop-item { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; }
        .prop-label { color: #666; width: 80px; font-size: 12px; }
        .prop-input { width: 45px; border: 1px solid #ddd; border-radius: 3px; padding: 2px 5px; font-size: 12px; text-align: center; }

        /* 메인 뷰어 */
        .main-viewer { flex: 1; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #current-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #333; }
        
        /* 김 애니메이션 */
        @keyframes steam {
            0% { transform: translateY(0) scaleX(1); opacity: 0; }
            15% { opacity: 0.4; }
            50% { transform: translateY(-30px) scaleX(1.1); opacity: 0.2; } 
            100% { transform: translateY(-60px) scaleX(1.2); opacity: 0; }
        }
        .steam-path { fill: none; stroke: #eee; stroke-width: 4; stroke-linecap: round; opacity: 0; animation: steam 3s infinite ease-out; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">📂 커피 레시피 (Coffee Recipe)</div>
        <div class="button-group">
            <button class="btn btn-green" onclick="saveToLocal()">브라우저 저장</button>
            <button class="btn btn-blue" onclick="exportToFile()">파일로 저장</button>
            <button class="btn btn-gray">불러오기</button>
        </div>
        <div class="tree-container" id="tree-root"></div>
    </div>

    <div class="main-viewer">
        <h2 id="current-title">레시피를 선택하세요</h2>
        <svg width="400" height="400" viewBox="0 0 320 320">
            <g id="steam-group">
                <path class="steam-path" style="animation-delay:0s" d="M145,75 c0,0, -10,-10, 0,-20 c10,-10, -10,-20, 0,-30" />
                <path class="steam-path" style="animation-delay:1.5s" d="M175,80 c0,0, -10,-10, 0,-20 c10,-10, -10,-20, 0,-30" />
            </g>
            
            <g id="cup-contents" clip-path="url(#cup-clip)"></g>

            <g fill="none" stroke="#00CCFF" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9,17 h4 a5,5,0,0,0,5-5 V11 h1 a3,3,0,0,0,0-6 H18 V4 a1,1,0,0,0,-1-1 H5 a1,1,0,0,0,-1,1 v8 a5,5,0,0,0,5,5 Z M18,7 h1 a1,1,0,0,1,0,2 H18 Z M6,5 H16 v7 a3,3,0,0,1,-3,3 H9 a3,3,0,0,1,-3,-3 Z M21,19 H3 a1,1,0,0,0,0,2 H21 a1,1,0,0,0,0,-2 Z" 
                      transform="scale(10) translate(3, 4)"/>
            </g>

            <defs>
                <clipPath id="cup-clip">
                    <rect x="90" y="80" width="100" height="130" rx="5" />
                </clipPath>
            </defs>
        </svg>
    </div>

<script>
    const coffeeData = {
        "ingredients": {
            "Espresso": { color: "#3E2723", textColor: "#FFFFFF" },
            "Hot Water": { color: "#F0F0F0", textColor: "#333333" },
            "Steamed Milk": { color: "#FFFFFF", textColor: "#9E9E9E" },
            "Milk Foam": { color: "#F5F5F5", textColor: "#757575" }
        },
        "recipes": [
            { "name": "아메리카노(Americano)", "layers": [{ "item": "Espresso", "ratio": 20 }, { "item": "Hot Water", "ratio": 80 }] },
            { "name": "카푸치노(Cappuccino)", "layers": [{ "item": "Espresso", "ratio": 20 }, { "item": "Steamed Milk", "ratio": 40 }, { "item": "Milk Foam", "ratio": 40 }] }
        ]
    };

    function initTree() {
        const treeRoot = document.getElementById('tree-root');
        treeRoot.innerHTML = '';
        coffeeData.recipes.forEach((recipe, rIdx) => {
            const node = document.createElement('div');
            node.className = 'node';
            
            const header = document.createElement('div');
            header.className = 'node-header';
            header.innerHTML = `
                <svg class="icon" viewBox="0 0 24 24"><path d="M9,17h4a5,5,0,0,0,5-5V11h1a3,3,0,0,0,0-6H18V4a1,1,0,0,0,-1-1H5A1,1,0,0,0,4,4v8A5,5,0,0,0,9,17ZM18,7h1a1,1,0,0,1,0,2H18ZM6,5H16v7a3,3,0,0,1-3,3H9a3,3,0,0,1-3-3ZM21,19H3a1,1,0,0,0,0,2H21a1,1,0,0,0,0,-2Z"/></svg>
                <span>${recipe.name}</span>
            `;
            
            const propsContainer = document.createElement('div');
            propsContainer.className = 'props-container';
            
            recipe.layers.forEach((layer, lIdx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'prop-item';
                itemDiv.innerHTML = `<span class="prop-label">${layer.item}</span><input type="number" class="prop-input" value="${layer.ratio}" oninput="updateRatio(${rIdx}, ${lIdx}, this.value)"> %`;
                propsContainer.appendChild(itemDiv);
            });

            header.onclick = () => {
                document.querySelectorAll('.props-container').forEach(p => p.classList.remove('show'));
                document.querySelectorAll('.node-header').forEach(h => h.classList.remove('active'));
                propsContainer.classList.add('show');
                header.classList.add('active');
                drawCup(recipe);
            };

            node.appendChild(header);
            node.appendChild(propsContainer);
            treeRoot.appendChild(node);
        });
    }

    function updateRatio(rIdx, lIdx, val) {
        coffeeData.recipes[rIdx].layers[lIdx].ratio = parseInt(val) || 0;
        drawCup(coffeeData.recipes[rIdx]);
    }

    function drawCup(recipe) {
        const contentsGroup = document.getElementById('cup-contents');
        contentsGroup.innerHTML = '';
        document.getElementById('current-title').innerText = recipe.name;

        const cupMaxH = 130;
        const yBase = 80;
        const totalRatio = recipe.layers.reduce((sum, l) => sum + l.ratio, 0);
        let currentY = yBase + cupMaxH;

        recipe.layers.forEach(layer => {
            const h = (layer.ratio / (totalRatio > 100 ? totalRatio : 100)) * cupMaxH;
            const targetY = currentY - h;
            const info = coffeeData.ingredients[layer.item] || {color: "#ccc", textColor: "#000"};

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", "90"); rect.setAttribute("y", targetY);
            rect.setAttribute("width", "100"); rect.setAttribute("height", h);
            rect.setAttribute("fill", info.color);
            contentsGroup.appendChild(rect);

            if (h > 15) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", "140"); text.setAttribute("y", targetY + (h / 2) + 4);
                text.setAttribute("fill", info.textColor); text.setAttribute("font-size", "9px");
                text.setAttribute("font-weight", "bold"); text.setAttribute("text-anchor", "middle");
                text.textContent = `${layer.item} (${layer.ratio}%)`;
                contentsGroup.appendChild(text);
            }
            currentY = targetY;
        });
    }

    function saveToLocal() { alert("브라우저에 저장되었습니다."); }
    function exportToFile() { alert("파일로 내보냅니다."); }

    initTree();
    setTimeout(() => document.querySelector('.node-header').click(), 100);
</script>
</body>
</html>
